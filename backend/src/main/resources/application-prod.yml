spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:}
      repositories:
        enabled: false

server:
  servlet:
    session:
      cookie:
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: ${SESSION_COOKIE_SAME_SITE:Lax}

synapsecore:
  access:
    allow-header-fallback: ${ALLOW_HEADER_FALLBACK:false}
