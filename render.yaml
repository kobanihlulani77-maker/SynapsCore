services:
  - type: web
    name: synapscore-3
    env: docker
    plan: starter
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_ADDRESS
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: synapscore-postgres
          property: connectionString
      - key: SPRING_DATA_REDIS_URL
        fromService:
          type: redis
          name: synapscore-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://synapscore-frontend-3.onrender.com
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAME_SITE
        value: None
      - key: ALLOW_HEADER_FALLBACK
        value: "false"
      - key: SYNAPSECORE_REALTIME_BROKER_MODE
        value: REDIS_PUBSUB
      - key: SYNAPSECORE_INTEGRATION_PULL_WORKER_ENABLED
        value: "true"
      - key: SYNAPSECORE_INTEGRATION_PULL_WORKER_INTERVAL_MS
        value: "60000"
      - key: SYNAPSECORE_INTEGRATION_PULL_WORKER_BATCH_SIZE
        value: "10"
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
      - key: PUBLIC_APP_URL
        value: https://synapscore-frontend-3.onrender.com
      - key: PUBLIC_API_URL
        value: https://synapscore-3.onrender.com
      - key: SYNAPSECORE_BUILD_VERSION
        value: 0.0.1
      - key: SYNAPSECORE_BUILD_COMMIT
        value: render-deploy
      - key: SYNAPSECORE_BUILD_TIME
        value: 2026-04-10T00:00:00Z

  - type: static
    name: synapscore-frontend-3
    plan: starter
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://synapscore-3.onrender.com
      - key: VITE_WS_URL
        value: https://synapscore-3.onrender.com/ws
      - key: VITE_APP_BUILD_VERSION
        value: 0.0.1
      - key: VITE_APP_BUILD_COMMIT
        value: render-deploy
      - key: VITE_APP_BUILD_TIME
        value: 2026-04-10T00:00:00Z

  - type: redis
    name: synapscore-redis
    plan: starter
    ipAllowList: []

databases:
  - name: synapscore-postgres
    plan: starter
    databaseName: synapsecore
    user: synapsecore
