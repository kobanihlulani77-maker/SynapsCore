services:
  postgres:
    image: postgres:15
    container_name: synapse_postgres
    environment:
      POSTGRES_DB: synapsecore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synapsecore"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: synapse_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    container_name: synapse_backend
    env_file:
      - ./env/backend.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
    container_name: synapse_frontend
    env_file:
      - ./env/frontend.env
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
