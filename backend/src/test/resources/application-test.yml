spring:
  datasource:
    url: jdbc:h2:mem:synapsecore;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

management:
  health:
    redis:
      enabled: false

synapsecore:
  access:
    allow-header-fallback: true
  dashboard:
    cache-enabled: false
  integration:
    pull-worker:
      enabled: false
    replay:
      max-attempts: 2
      backoff-seconds: 0
