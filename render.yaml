services:
  - type: web
    name: synapsecore-backend
    env: docker
    plan: starter
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_ADDRESS
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: synapsecore-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: synapsecore-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://synapsecore-frontend.onrender.com
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAME_SITE
        value: None
      - key: ALLOW_HEADER_FALLBACK
        value: "false"
      - key: JPA_DDL_AUTO
        value: validate
      - key: PUBLIC_APP_URL
        value: https://synapsecore-frontend.onrender.com
      - key: PUBLIC_API_URL
        value: https://synapsecore-backend.onrender.com
      - key: SYNAPSECORE_BUILD_VERSION
        value: 0.0.1
      - key: SYNAPSECORE_BUILD_COMMIT
        value: render-deploy
      - key: SYNAPSECORE_BUILD_TIME
        value: 2026-04-10T00:00:00Z

  - type: static
    name: synapsecore-frontend
    plan: starter
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://synapsecore-backend.onrender.com
      - key: VITE_WS_URL
        value: wss://synapsecore-backend.onrender.com/ws
      - key: VITE_APP_BUILD_VERSION
        value: 0.0.1
      - key: VITE_APP_BUILD_COMMIT
        value: render-deploy
      - key: VITE_APP_BUILD_TIME
        value: 2026-04-10T00:00:00Z

  - type: redis
    name: synapsecore-redis
    plan: starter
    ipAllowList: []

databases:
  - name: synapsecore-postgres
    plan: starter
    databaseName: synapsecore
    user: synapsecore
