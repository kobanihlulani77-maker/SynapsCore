spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:}
      repositories:
        enabled: false

server:
  servlet:
    session:
      cookie:
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: ${SESSION_COOKIE_SAME_SITE:Lax}

synapsecore:
  access:
    allow-header-fallback: ${ALLOW_HEADER_FALLBACK:false}
  demo:
    auto-seed-on-empty: ${SYNAPSECORE_DEMO_AUTO_SEED_ON_EMPTY:false}
    allow-default-tenant-fallback: ${SYNAPSECORE_DEMO_ALLOW_DEFAULT_TENANT_FALLBACK:false}
    simulation-enabled: ${SYNAPSECORE_DEMO_SIMULATION_ENABLED:false}
    seed-starter-inventory-on-tenant-onboarding: ${SYNAPSECORE_DEMO_SEED_STARTER_INVENTORY_ON_TENANT_ONBOARDING:false}
    seed-starter-connectors-on-tenant-onboarding: ${SYNAPSECORE_DEMO_SEED_STARTER_CONNECTORS_ON_TENANT_ONBOARDING:false}
    allow-tenant-admin-tenant-onboarding: ${SYNAPSECORE_DEMO_ALLOW_TENANT_ADMIN_TENANT_ONBOARDING:false}
